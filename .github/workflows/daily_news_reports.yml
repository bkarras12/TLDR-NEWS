name: Daily AI News Reports

on:
  workflow_dispatch:
  push:
    branches: [main, master, "claude/claude-md-*"]
    paths:
      - "ai_news_reports_site/news/**"
      - "ai_news_reports_site/pipeline/**"
      - ".github/workflows/daily_news_reports.yml"
  schedule:
    # All times MST (UTC-7). GitHub cron uses UTC.
    - cron: "0 14 * * *"   # 7:00 AM MST
    - cron: "0 23 * * *"   # 4:00 PM MST
    - cron: "0 3 * * *"    # 8:00 PM MST

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "daily-ai-news-reports"
  cancel-in-progress: false

jobs:
  build-update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ai_news_reports_site
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        if: github.event_name != 'push'
        working-directory: ai_news_reports_site
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python -m pipeline.run_daily

      - name: Commit updated reports (if changed)
        if: github.event_name != 'push'
        run: |
          git status --porcelain
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add ai_news_reports_site/news/data \
                 ai_news_reports_site/news/feeds \
                 ai_news_reports_site/news/articles \
                 ai_news_reports_site/news/sitemap.xml \
                 ai_news_reports_site/news/news-sitemap.xml \
                 ai_news_reports_site/news/robots.txt
          # Stage static HTML pages (date dirs and category landing dirs)
          find ai_news_reports_site/news -maxdepth 2 -name '*.html' -not -path '*/news/reports.html' -not -path '*/news/index.html' | xargs -r git add
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily news report: $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai_news_reports_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
