name: Post to X

on:
  workflow_dispatch:
    inputs:
      category:
        description: "Category key to post (world, business, technology, sports, science)"
        required: true
        default: "world"
  schedule:
    # Staggered 20 min apart, starting 50 min after pipeline (14:10 UTC)
    - cron: "0 15 * * *"   # world
    - cron: "20 15 * * *"  # business
    - cron: "40 15 * * *"  # technology
    - cron: "0 16 * * *"   # sports
    - cron: "20 16 * * *"  # science

jobs:
  post-tweet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ai_news_reports_site
        run: |
          python -m pip install --upgrade pip
          pip install tweepy>=4.14.0

      - name: Determine category
        id: cat
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "key=${{ github.event.inputs.category }}" >> "$GITHUB_OUTPUT"
          else
            # Map cron expression to category key (immune to runner delay)
            case "${{ github.event.schedule }}" in
              "0 15 * * *")  echo "key=world" >> "$GITHUB_OUTPUT" ;;
              "20 15 * * *") echo "key=business" >> "$GITHUB_OUTPUT" ;;
              "40 15 * * *") echo "key=technology" >> "$GITHUB_OUTPUT" ;;
              "0 16 * * *")  echo "key=sports" >> "$GITHUB_OUTPUT" ;;
              "20 16 * * *") echo "key=science" >> "$GITHUB_OUTPUT" ;;
              *) echo "ERROR: unknown schedule '${{ github.event.schedule }}'"; exit 1 ;;
            esac
          fi

      - name: Post tweet
        working-directory: ai_news_reports_site
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: |
          python -m pipeline.post_tweets ${{ steps.cat.outputs.key }}
