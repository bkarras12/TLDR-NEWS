<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <base href="/news/" />
  <title>AI News Reports · TL;DR News</title>
  <meta name="description" id="metaDesc" content="Daily, agent-generated news summaries across 5 categories — world, business, technology, sports, and science." />
  <meta name="color-scheme" content="dark light" />
  <link rel="canonical" href="https://tldrnews.info/" />
  <meta property="og:title" content="TL;DR News — AI-Powered Daily Intelligence" />
  <meta property="og:description" id="ogDesc" content="Daily AI-generated news summaries across world, business, technology, sports, and science." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tldrnews.info/" />
  <meta property="og:site_name" content="TL;DR News" />
  <meta property="og:image" content="https://tldrnews.info/news/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TL;DR News — AI-Powered Daily Intelligence" />
  <meta name="twitter:description" content="Daily AI-generated news summaries across 5 categories." />
  <meta name="twitter:image" content="https://tldrnews.info/news/og-image.png" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TL;DR News",
    "url": "https://tldrnews.info/",
    "description": "Daily AI-powered news intelligence across world, business, technology, sports, and science",
    "publisher": {
      "@type": "Organization",
      "name": "TL;DR News",
      "url": "https://tldrnews.info/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://tldrnews.info/news/og-image.png"
      }
    }
  }
  </script>

  <link rel="icon" type="image/x-icon" href="tldr_logo.ico">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — All Categories" href="feeds/all.xml">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — World" href="feeds/world.xml">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Business" href="feeds/business.xml">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Technology" href="feeds/technology.xml">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Sports" href="feeds/sports.xml">
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Science" href="feeds/science.xml">
  <link rel="sitemap" type="application/xml" href="sitemap.xml">

  <!-- Apply mode pref before paint to avoid flash -->
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("tldr_mode") || "dark";
        document.documentElement.dataset.mode = mode;
      } catch (_) {
        document.documentElement.dataset.mode = "dark";
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Scroll progress bar -->
  <div id="pg-bar" aria-hidden="true"></div>

  <!-- Ambient background blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__blob b1"></div>
    <div class="ambient__blob b2"></div>
    <div class="ambient__blob b3"></div>
  </div>

  <!-- Mobile nav overlay -->
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Site navigation">
      <a class="skip-link" href="javascript:void(0)" onclick="document.getElementById('content').focus()">Skip to reports</a>

      <div class="sidebar__inner">

        <!-- Brand -->
        <div class="sidebar__brand">
          <div class="logo" aria-hidden="true">TL;DR</div>
          <div class="brand__text">
            <div class="brand__name">TLDR News</div>
            <div class="brand__tagline">AI Intelligence</div>
          </div>
          <button class="sidebar__close" id="sidebarClose" aria-label="Close navigation">&#10005;</button>
        </div>

        <!-- Page navigation -->
        <div class="sidebar__section">
          <div class="sidebar__label">Navigate</div>
          <div class="tabs">
            <a href="reports.html" class="tab active">Reports</a>
            <a href="articles.html" class="tab">Articles</a>
          </div>
        </div>

        <!-- Category navigation -->
        <div class="sidebar__section">
          <div class="sidebar__label">Categories</div>
          <div id="tabs" class="tabs" role="tablist"></div>
        </div>

        <!-- Date picker -->
        <div class="sidebar__section">
          <div class="sidebar__label">Report Date</div>
          <select id="dateSelect" aria-label="Select report date"></select>
        </div>

        <!-- Action buttons -->
        <div class="sidebar__actions">
          <button id="refreshBtn" class="btn btn--primary" type="button" aria-label="Refresh reports">
            &#8635; Refresh
          </button>
          <button id="modeToggle" class="btn" type="button" aria-pressed="true">
            &#9790; Dark mode
          </button>
        </div>

        <!-- Status line -->
        <div class="statusline" role="status" aria-live="polite" aria-atomic="true">
          <span id="status" class="muted"></span>
          <span id="error" class="error" hidden></span>
        </div>

        <!-- Sidebar footer -->
        <div class="sidebar__footer">
          Quick intelligence for shortened attention spans
        </div>

      </div>
    </aside>

    <!-- ── Main area ── -->
    <div class="main-area">

      <!-- Topbar -->
      <header class="topbar" role="banner">
        <button class="hamburger" id="hamburger" type="button"
                aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar__title">
          <span class="topbar__cat" id="topbarCat">World</span>
          <span class="topbar__sep">&middot;</span>
          <span class="topbar__date" id="topbarDate">Loading&hellip;</span>
        </h1>
        <span id="live-clock" class="live-clock" aria-label="Current date and time"></span>
      </header>

      <!-- Scrollable content -->
      <div class="content-scroll" id="contentScroll">
        <main id="content" class="content" role="main" tabindex="-1"></main>
        <footer class="site-footer" role="contentinfo">
          <span class="muted">Daily AI-powered news intelligence &middot; TL;DR News</span>
        </footer>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
