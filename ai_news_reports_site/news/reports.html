<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI News Reports · TL;DR News</title>
  <meta name="description" id="metaDesc" content="Daily AI-generated news summaries across world, business, technology, sports, and science." />
  <meta name="color-scheme" content="dark light" />
  <meta property="og:title" content="TL;DR News — AI-Powered Daily Intelligence" />
  <meta property="og:description" id="ogDesc" content="Daily AI-generated news summaries across world, business, technology, sports, and science." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="TL;DR News" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="TL;DR News — AI-Powered Daily Intelligence" />
  <meta name="twitter:description" content="Daily AI-generated news summaries across 5 categories." />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — All Categories" href="feeds/all.xml" />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — World" href="feeds/world.xml" />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Business" href="feeds/business.xml" />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Technology" href="feeds/technology.xml" />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Sports" href="feeds/sports.xml" />
  <link rel="alternate" type="application/rss+xml" title="TL;DR News — Science" href="feeds/science.xml" />
  <link rel="sitemap" type="application/xml" href="sitemap.xml" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "TL;DR News",
    "description": "Daily AI-powered news intelligence across world, business, technology, sports, and science",
    "applicationCategory": "NewsApplication",
    "operatingSystem": "Web",
    "author": {
      "@type": "Organization",
      "name": "TL;DR News AI"
    },
    "publisher": {
      "@type": "Organization",
      "name": "TL;DR News"
    }
  }
  </script>

  <link rel="icon" type="image/x-icon" href="tldr_logo.ico">

  <!-- Force Brutalism (and preserve mode/layout prefs). -->
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("tldr_mode") || "dark";
        const layout = localStorage.getItem("tldr_layout") || "classic";
        document.documentElement.dataset.style = "brutal";
        document.documentElement.dataset.mode = mode;
        document.documentElement.dataset.layout = layout;
      } catch (_) {
        document.documentElement.dataset.style = "brutal";
        document.documentElement.dataset.mode = "dark";
        document.documentElement.dataset.layout = "classic";
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Ambient background -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__blob b1"></div>
    <div class="ambient__blob b2"></div>
    <div class="ambient__blob b3"></div>
    <div class="ambient__noise"></div>
  </div>

  <div class="wrap">
    <a class="skip-link" href="#content">Skip to reports</a>

    <header class="hero" role="banner">
      <div class="hero__bg" aria-hidden="true"></div>

      <div class="hero__top">
        <div class="brand" aria-label="Site branding">
          <div class="logo" aria-hidden="true">TL;DR</div>
          <div class="brand__text">
            <h1 class="title">AI News Reports</h1>
            <p class="sub">Daily, agent-generated summaries across 5 categories.</p>
          </div>
        </div>

        <div class="controls" aria-label="Report controls">
          <div class="control">
            <label for="dateSelect">Date</label>
            <select id="dateSelect" aria-label="Select report date"></select>
          </div>

          <div class="control control--actions" aria-label="Actions">
            <button id="refreshBtn" class="btn primary" type="button" aria-label="Refresh reports">
              Refresh
            </button>
          </div>
        </div>
      </div>

      <div class="hero__bottom">
        <div class="statusline" role="status" aria-live="polite" aria-atomic="true">
          <span id="status" class="muted"></span>
          <span id="error" class="error" hidden></span>
        </div>

        <nav class="tabs-wrap" aria-label="News categories">
          <div id="tabs" class="tabs" role="tablist"></div>
        </nav>
      </div>
    </header>

    <main id="content" class="content" role="main" tabindex="-1"></main>

    <footer class="site-footer" role="contentinfo">
      <span class="muted">Quick news for shortened attention spans</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
