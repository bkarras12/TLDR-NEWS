<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI News Reports · TL;DR News</title>
  <meta name="description" content="Daily, agent-generated news summaries across 5 categories." />
  <meta name="color-scheme" content="dark light" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical (updated dynamically by app.js per report) -->
  <link rel="canonical" id="metaCanonical" href="https://YOUR_DOMAIN/news/reports.html" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="TL;DR News" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_US" />
  <meta id="metaOgTitle" property="og:title" content="TL;DR News — Daily AI News Reports" />
  <meta id="metaOgDesc" property="og:description" content="Daily AI-generated news summaries across World, Business, Technology, Sports, and Science." />
  <meta id="metaOgUrl" property="og:url" content="https://YOUR_DOMAIN/news/reports.html" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta id="metaTwTitle" name="twitter:title" content="TL;DR News — Daily AI News Reports" />
  <meta id="metaTwDesc" name="twitter:description" content="Daily AI-generated news summaries across World, Business, Technology, Sports, and Science." />

  <!-- JSON-LD: WebSite + NewsMediaOrganization (static) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "name": "TL;DR News",
        "url": "https://YOUR_DOMAIN/",
        "description": "Daily AI-generated news intelligence across 5 categories.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://YOUR_DOMAIN/news/reports.html?date={date}",
          "query-input": "required name=date"
        }
      },
      {
        "@type": "NewsMediaOrganization",
        "name": "TL;DR News",
        "url": "https://YOUR_DOMAIN/",
        "description": "Automated daily news intelligence powered by AI."
      }
    ]
  }
  </script>

  <!-- JSON-LD: WebPage — injected dynamically by app.js per report -->
  <script id="jsonLdPage" type="application/ld+json">{}</script>

  <!-- RSS feed discovery -->
  <link rel="alternate" type="application/rss+xml"
        title="TL;DR News — Daily AI Briefings"
        href="https://YOUR_DOMAIN/feed.xml" />

  <!-- Force Brutalism (and preserve mode/layout prefs). -->
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("tldr_mode") || "dark";
        const layout = localStorage.getItem("tldr_layout") || "classic";
        document.documentElement.dataset.style = "brutal";
        document.documentElement.dataset.mode = mode;
        document.documentElement.dataset.layout = layout;
      } catch (_) {
        document.documentElement.dataset.style = "brutal";
        document.documentElement.dataset.mode = "dark";
        document.documentElement.dataset.layout = "classic";
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="progressBar" aria-hidden="true"></div>
  <!-- Ambient background -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__blob b1"></div>
    <div class="ambient__blob b2"></div>
    <div class="ambient__blob b3"></div>
    <div class="ambient__noise"></div>
  </div>

  <div class="wrap">
    <a class="skip-link" href="#content">Skip to reports</a>

    <header class="hero" role="banner">
      <div class="hero__bg" aria-hidden="true"></div>

      <div class="hero__top">
        <div class="brand" aria-label="Site branding">
          <div class="logo" aria-hidden="true">TL;DR</div>
          <div class="brand__text">
            <h1 class="title">AI News Reports</h1>
            <p class="sub">Daily, agent-generated summaries across 5 categories.</p>
          </div>
        </div>

        <div class="controls" aria-label="Report controls">
          <div class="control">
            <label for="dateSelect">Date</label>
            <select id="dateSelect" aria-label="Select report date"></select>
          </div>

          <div class="control control--actions" aria-label="Actions">
            <button id="shareBtn" class="btn" type="button" aria-label="Share this report">Share</button>
            <button id="prefsBtn" class="btn" type="button" aria-label="Customize categories">Customize</button>
            <button id="refreshBtn" class="btn primary" type="button" aria-label="Refresh reports">Refresh</button>
          </div>
        </div>
      </div>

      <div class="hero__bottom">
        <div class="statusline" role="status" aria-live="polite" aria-atomic="true">
          <span id="status" class="muted"></span>
          <span id="error" class="error" hidden></span>
        </div>

        <nav class="tabs-wrap" aria-label="News categories">
          <div id="tabs" class="tabs" role="tablist"></div>
        </nav>

        <!-- Category preferences panel (toggled by Customize button) -->
        <div id="prefsPanel" class="prefs-panel" hidden aria-label="Customize visible categories"></div>
      </div>
    </header>

    <!-- Newsletter signup band -->
    <section class="signup-band" aria-label="Newsletter signup">
      <div class="signup-band__inner">
        <div class="signup-band__copy">
          <strong>Get the daily briefing in your inbox.</strong>
          <span class="muted">Free. No fluff. Unsubscribe anytime.</span>
        </div>
        <!-- Replace action URL with your Beehiiv/ConvertKit embed URL -->
        <form class="signup-form" action="YOUR_BEEHIIV_EMBED_URL" method="post"
              target="_blank" rel="noopener">
          <input type="email" name="email" placeholder="your@email.com"
                 required autocomplete="email" aria-label="Email address" />
          <button type="submit" class="btn primary">Subscribe free</button>
        </form>
      </div>
    </section>

    <main id="content" class="content" role="main" tabindex="-1"></main>

    <footer class="site-footer" role="contentinfo">
      <span class="muted">Quick news for shortened attention spans</span>
      <span class="site-footer__sep" aria-hidden="true">·</span>
      <!-- Replace YOUR_KOFI_ID with your Ko-fi username -->
      <a href="https://ko-fi.com/YOUR_KOFI_ID" target="_blank" rel="noopener"
         class="kofi-btn" aria-label="Support TL;DR News on Ko-fi">&#9829; Support</a>
      <span class="site-footer__sep" aria-hidden="true">·</span>
      <a href="https://YOUR_DOMAIN/feed.xml" class="muted" aria-label="RSS feed">RSS</a>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
