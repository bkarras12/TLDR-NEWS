<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI News Reports · TL;DR News</title>
  <meta name="description" content="Daily, agent-generated news summaries across 5 categories." />
  <meta name="color-scheme" content="dark light" />

  <link rel="icon" type="image/x-icon" href="tldr_logo.ico">

  <!-- Apply mode pref before paint to avoid flash -->
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("tldr_mode") || "dark";
        document.documentElement.dataset.mode = mode;
      } catch (_) {
        document.documentElement.dataset.mode = "dark";
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Scroll progress bar -->
  <div id="pg-bar" aria-hidden="true"></div>

  <!-- Ambient background blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__blob b1"></div>
    <div class="ambient__blob b2"></div>
    <div class="ambient__blob b3"></div>
    <div class="ambient__noise"></div>
  </div>

  <div class="wrap">
    <a class="skip-link" href="#content">Skip to reports</a>

    <header class="hero" role="banner">
      <div class="hero__bg" aria-hidden="true"></div>

      <div class="hero__top">
        <div class="brand" aria-label="Site branding">
          <div class="logo" aria-hidden="true">TL;DR</div>
          <div class="brand__text">
            <h1>AI News Reports</h1>
            <p class="sub">Daily, agent-generated summaries &middot; 5 categories</p>
          </div>
        </div>

        <span id="live-clock" class="live-clock" aria-label="Current date and time"></span>

        <div class="controls" aria-label="Report controls">
          <div class="control">
            <label for="dateSelect">Report date</label>
            <select id="dateSelect" aria-label="Select report date"></select>
          </div>
          <div class="control control--actions">
            <label style="visibility:hidden">&#8203;</label>
            <button id="refreshBtn" class="btn primary" type="button" aria-label="Refresh reports">
              &#8635; Refresh
            </button>
          </div>
          <div class="control control--actions">
            <label style="visibility:hidden">&#8203;</label>
            <button id="modeToggle" class="btn" type="button" aria-pressed="true">
              Dark mode: On
            </button>
          </div>
        </div>
      </div>

      <div class="hero__bottom">
        <div class="statusline" role="status" aria-live="polite" aria-atomic="true">
          <span id="status" class="muted"></span>
          <span id="error" class="error" hidden></span>
        </div>

        <nav class="tabs-wrap" aria-label="News categories">
          <div id="tabs" class="tabs" role="tablist"></div>
        </nav>
      </div>
    </header>

    <main id="content" class="content" role="main" tabindex="-1"></main>

    <footer class="site-footer" role="contentinfo">
      <span class="muted">Quick intelligence for shortened attention spans</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
