<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Primary SEO -->
  <title>TLDR News · AI-Powered Daily News Intelligence</title>
  <meta name="description" content="Daily AI-generated news intelligence across world news, business, technology, sports, and science. Each report includes executive summaries, sentiment analysis, notable headlines, and forward-looking outlooks — powered by GPT-4o-mini." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="TLDR News AI Pipeline" />
  <meta name="color-scheme" content="dark light" />

  <!-- Canonical (updated dynamically by app.js when a report is viewed) -->
  <link rel="canonical" href="https://bkarras12.github.io/TLDR-NEWS/news/reports.html" id="canonicalLink" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="TLDR News" />
  <meta property="og:title"       content="TLDR News · AI-Powered Daily News Intelligence" />
  <meta property="og:description" content="Daily AI-generated news intelligence across world news, business, technology, sports, and science." />
  <meta property="og:url"         content="https://bkarras12.github.io/TLDR-NEWS/news/reports.html" />
  <meta property="og:image"       content="https://bkarras12.github.io/TLDR-NEWS/news/tldr_logo.png" />
  <meta property="og:image:alt"   content="TLDR News logo" />

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="TLDR News · AI Daily Intelligence" />
  <meta name="twitter:description" content="Daily AI-generated news intelligence across 5 categories: world, business, technology, sports, and science." />
  <meta name="twitter:image"       content="https://bkarras12.github.io/TLDR-NEWS/news/tldr_logo.png" />

  <!-- JSON-LD: site-level schema for GEO (generative engine optimisation) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://bkarras12.github.io/TLDR-NEWS/#website",
        "name": "TLDR News",
        "alternateName": "TL;DR News",
        "description": "Daily AI-generated news intelligence across world news, business, technology, sports, and science. Each report includes executive summaries, key themes, sentiment scoring, notable headlines with signal classification, and forward-looking outlooks.",
        "url": "https://bkarras12.github.io/TLDR-NEWS/",
        "inLanguage": "en",
        "publisher": {
          "@type": "Organization",
          "@id": "https://bkarras12.github.io/TLDR-NEWS/#org",
          "name": "TLDR News",
          "url": "https://bkarras12.github.io/TLDR-NEWS/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://bkarras12.github.io/TLDR-NEWS/news/tldr_logo.png"
          },
          "description": "An automated AI news aggregation and analysis service that processes RSS feeds from trusted sources daily and produces structured intelligence reports."
        },
        "potentialAction": {
          "@type": "ReadAction",
          "target": "https://bkarras12.github.io/TLDR-NEWS/news/reports.html"
        }
      },
      {
        "@type": "WebPage",
        "@id": "https://bkarras12.github.io/TLDR-NEWS/news/reports.html#webpage",
        "url": "https://bkarras12.github.io/TLDR-NEWS/news/reports.html",
        "name": "TLDR News · AI-Powered Daily News Intelligence",
        "isPartOf": { "@id": "https://bkarras12.github.io/TLDR-NEWS/#website" },
        "about": {
          "@type": "Thing",
          "name": "AI-generated news analysis",
          "description": "Automated daily summaries of world, business, technology, sports, and science news using large language models."
        },
        "breadcrumb": {
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "TLDR News", "item": "https://bkarras12.github.io/TLDR-NEWS/" },
            { "@type": "ListItem", "position": 2, "name": "Daily Reports", "item": "https://bkarras12.github.io/TLDR-NEWS/news/reports.html" }
          ]
        }
      }
    ]
  }
  </script>

  <!-- Dynamic JSON-LD placeholder — replaced by app.js with NewsArticle schema per report view -->
  <script type="application/ld+json" id="dynamicSchema">{}</script>

  <link rel="icon" type="image/x-icon" href="tldr_logo.ico">

  <!-- Apply mode pref before paint to avoid flash -->
  <script>
    (function () {
      try {
        const mode = localStorage.getItem("tldr_mode") || "dark";
        document.documentElement.dataset.mode = mode;
      } catch (_) {
        document.documentElement.dataset.mode = "dark";
      }
    })();
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Scroll progress bar -->
  <div id="pg-bar" aria-hidden="true"></div>

  <!-- Ambient background blobs -->
  <div class="ambient" aria-hidden="true">
    <div class="ambient__blob b1"></div>
    <div class="ambient__blob b2"></div>
    <div class="ambient__blob b3"></div>
  </div>

  <!-- Mobile nav overlay -->
  <div class="nav-overlay" id="navOverlay" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Site navigation">
      <a class="skip-link" href="#content">Skip to reports</a>

      <div class="sidebar__inner">

        <!-- Brand -->
        <div class="sidebar__brand">
          <div class="logo" aria-hidden="true">TL;DR</div>
          <div class="brand__text">
            <div class="brand__name">TLDR News</div>
            <div class="brand__tagline">AI Intelligence</div>
          </div>
          <button class="sidebar__close" id="sidebarClose" aria-label="Close navigation">&#10005;</button>
        </div>

        <!-- Category navigation -->
        <div class="sidebar__section">
          <div class="sidebar__label">Categories</div>
          <div id="tabs" class="tabs" role="tablist"></div>
        </div>

        <!-- Date picker -->
        <div class="sidebar__section">
          <div class="sidebar__label">Report Date</div>
          <select id="dateSelect" aria-label="Select report date"></select>
        </div>

        <!-- Action buttons -->
        <div class="sidebar__actions">
          <button id="refreshBtn" class="btn btn--primary" type="button" aria-label="Refresh reports">
            &#8635; Refresh
          </button>
          <button id="modeToggle" class="btn" type="button" aria-pressed="true">
            &#9790; Dark mode
          </button>
        </div>

        <!-- Status line -->
        <div class="statusline" role="status" aria-live="polite" aria-atomic="true">
          <span id="status" class="muted"></span>
          <span id="error" class="error" hidden></span>
        </div>

        <!-- Sidebar footer -->
        <div class="sidebar__footer">
          Quick intelligence for shortened attention spans
        </div>

      </div>
    </aside>

    <!-- ── Main area ── -->
    <div class="main-area">

      <!-- Topbar -->
      <header class="topbar" role="banner">
        <button class="hamburger" id="hamburger" type="button"
                aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
          <span></span><span></span><span></span>
        </button>
        <div class="topbar__title">
          <span class="topbar__cat" id="topbarCat">World</span>
          <span class="topbar__sep">&middot;</span>
          <span class="topbar__date" id="topbarDate">Loading&hellip;</span>
        </div>
        <span id="live-clock" class="live-clock" aria-label="Current date and time"></span>
      </header>

      <!-- Scrollable content -->
      <div class="content-scroll" id="contentScroll">
        <main id="content" class="content" role="main" tabindex="-1"></main>
        <footer class="site-footer" role="contentinfo">
          <span class="muted">Daily AI-powered news intelligence &middot; TL;DR News</span>
        </footer>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
